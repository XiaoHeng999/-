<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="p12-header">
    <text x="60" y="74" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="30" font-weight="800" fill="#1A3C6E">三类用户在低维空间高度重叠，频率由多因素共同塑造</text>
    <rect x="62" y="90" width="60" height="5" rx="2.5" fill="#B11226"/>
  </g>

  <g id="panel-pca">
    <text x="60" y="132" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#B11226" letter-spacing="2">PCA 二维投影 · PC1 17.4% · PC2 5.8% · 合计仅 23.3%</text>
    <rect x="60" y="142" width="640" height="520" rx="10" fill="#FAF8F3" stroke="#D4D0C4" stroke-width="1"/>
    <image href="../images/pca_scatter.png" x="64" y="146" width="632" height="512" preserveAspectRatio="xMidYMid meet"/>
    <!-- #46 bordered lens rectangle highlighting the central overlap region -->
    <rect x="260" y="330" width="240" height="160" rx="8" fill="none" stroke="#B11226" stroke-width="3" stroke-dasharray="10,5"/>
    <text x="380" y="322" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#B11226">三类大面积重叠区</text>
  </g>

  <g id="pca-takeaway">
    <use data-icon="tabler-outline/focus-2" x="740" y="150" width="34" height="34" fill="#1A3C6E" stroke-width="2"/>
    <text x="740" y="224" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="32" font-weight="800" fill="#1A3C6E">
      <tspan x="740" dy="0">没有单一维度，</tspan>
      <tspan x="740" dy="44">能线性切开三类。</tspan>
    </text>
    <rect x="742" y="300" width="84" height="5" rx="2.5" fill="#B11226"/>

    <rect x="740" y="332" width="480" height="96" rx="10" fill="#F3F1EC"/>
    <text x="762" y="362" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="40" font-weight="800" fill="#B11226">23.3%</text>
    <text x="898" y="362" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" fill="#56606B">前两主成分</text>
    <text x="898" y="386" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" fill="#56606B">仅解释的方差</text>
    <text x="762" y="414" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#8C949D">PC1 17.4% · PC2 5.8% —— 二维不足以分离三类</text>

    <text x="740" y="464" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#B11226" letter-spacing="2">几何证据 · 三类在中央重叠</text>
    <text x="740" y="498" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" fill="#23262B">使用频率是高维多因素现象，</text>
    <text x="740" y="524" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" fill="#23262B">需多特征联合建模，</text>
    <text x="740" y="550" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" fill="#23262B">而非单一线性判别。</text>

    <rect x="740" y="580" width="480" height="82" rx="10" fill="#FFFFFF" stroke="#D4D0C4" stroke-width="1"/>
    <rect x="740" y="580" width="5" height="82" rx="2.5" fill="#5B7DB1"/>
    <use data-icon="tabler-outline/bulb" x="762" y="598" width="22" height="22" fill="#5B7DB1" stroke-width="2"/>
    <text x="794" y="616" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" font-weight="700" fill="#1A3C6E">呼应分类难度</text>
    <text x="762" y="642" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#56606B">重叠既是 PCA 的局限，也解释了</text>
    <text x="762" y="660" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#56606B">为何 Macro F1 难以突破 0.5。</text>
  </g>

  <g id="p12-footer">
    <line x1="60" y1="690" x2="1220" y2="690" stroke="#E8E3D6" stroke-width="1"/>
    <text x="60" y="708" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="11" fill="#8C949D">数据来源：results/pca/pca_scatter.png（PCA 降至 2 维可视化）</text>
    <text x="1220" y="708" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="11" fill="#8C949D">12 / 14</text>
  </g>
</svg>
