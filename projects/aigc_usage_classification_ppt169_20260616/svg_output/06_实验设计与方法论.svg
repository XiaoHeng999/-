<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="p06-header">
    <text x="60" y="74" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="30" font-weight="800" fill="#1A3C6E">SMOTE + 分层划分 + 5 折 CV，三大实验逐层验证结论</text>
    <rect x="62" y="90" width="60" height="5" rx="2.5" fill="#B11226"/>
  </g>

  <g id="pipeline-row">
    <text x="60" y="142" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#B11226" letter-spacing="2">建模管线 · 防泄漏可复现</text>
    <rect x="60" y="158" width="1160" height="150" rx="10" fill="#F3F1EC"/>

    <g id="stage-smote">
      <rect x="78" y="178" width="258" height="110" rx="8" fill="#FFFFFF" stroke="#D4D0C4" stroke-width="1"/>
      <rect x="78" y="178" width="258" height="34" rx="8" fill="#1A3C6E"/>
      <rect x="78" y="200" width="258" height="12" fill="#1A3C6E"/>
      <use data-icon="tabler-outline/git-branch" x="92" y="184" width="22" height="22" fill="#FFFFFF" stroke-width="2"/>
      <text x="122" y="201" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">SMOTE 过采样</text>
      <text x="92" y="238" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#23262B">仅训练集内合成少数类</text>
      <text x="92" y="262" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#56606B">测试集保持原始分布</text>
    </g>
    <polygon points="342,233 354,233 354,227 366,237 354,247 354,241 342,241" fill="#8C949D"/>

    <g id="stage-split">
      <rect x="372" y="178" width="258" height="110" rx="8" fill="#FFFFFF" stroke="#D4D0C4" stroke-width="1"/>
      <rect x="372" y="178" width="258" height="34" rx="8" fill="#5B7DB1"/>
      <rect x="372" y="200" width="258" height="12" fill="#5B7DB1"/>
      <use data-icon="tabler-outline/scale" x="386" y="184" width="22" height="22" fill="#FFFFFF" stroke-width="2"/>
      <text x="416" y="201" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">分层划分 80/20</text>
      <text x="386" y="238" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#23262B">Stratified Split</text>
      <text x="386" y="262" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#56606B">保持三类比例一致</text>
    </g>
    <polygon points="636,233 648,233 648,227 660,237 648,247 648,241 636,241" fill="#8C949D"/>

    <g id="stage-cv">
      <rect x="666" y="178" width="258" height="110" rx="8" fill="#FFFFFF" stroke="#D4D0C4" stroke-width="1"/>
      <rect x="666" y="178" width="258" height="34" rx="8" fill="#5B7DB1"/>
      <rect x="666" y="200" width="258" height="12" fill="#5B7DB1"/>
      <use data-icon="tabler-outline/clipboard-check" x="680" y="184" width="22" height="22" fill="#FFFFFF" stroke-width="2"/>
      <text x="710" y="201" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">5 折交叉验证</text>
      <text x="680" y="238" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#23262B">5-Fold CV</text>
      <text x="680" y="262" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#56606B">稳健估计泛化性能</text>
    </g>
    <polygon points="930,233 942,233 942,227 954,237 942,247 942,241 930,241" fill="#8C949D"/>

    <g id="stage-metric">
      <rect x="960" y="178" width="242" height="110" rx="8" fill="#FFFFFF" stroke="#D4D0C4" stroke-width="1"/>
      <rect x="960" y="178" width="242" height="34" rx="8" fill="#B11226"/>
      <rect x="960" y="200" width="242" height="12" fill="#B11226"/>
      <use data-icon="tabler-outline/chart-bar" x="974" y="184" width="22" height="22" fill="#FFFFFF" stroke-width="2"/>
      <text x="1004" y="201" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">指标评估</text>
      <text x="974" y="238" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#23262B"><tspan font-weight="800" fill="#B11226">Macro F1</tspan> 为主</text>
      <text x="974" y="262" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#56606B">+ 每类 P/R + 混淆矩阵</text>
    </g>
  </g>

  <g id="experiments">
    <text x="60" y="346" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#B11226" letter-spacing="2">三大实验 · 递进验证</text>

    <g id="exp1">
      <rect x="60" y="364" width="374" height="270" rx="10" fill="#FFFFFF" stroke="#D4D0C4" stroke-width="1"/>
      <rect x="60" y="364" width="374" height="56" rx="10" fill="#1A3C6E"/>
      <rect x="60" y="396" width="374" height="24" fill="#1A3C6E"/>
      <circle cx="92" cy="392" r="18" fill="#FFFFFF" fill-opacity="0.15"/>
      <text x="92" y="399" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">01</text>
      <text x="120" y="399" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">多模型对比</text>
      <use data-icon="tabler-outline/trophy" x="80" y="440" width="26" height="26" fill="#1A3C6E" stroke-width="2"/>
      <text x="116" y="460" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" font-weight="700" fill="#23262B">6 个模型同台竞技</text>
      <text x="80" y="494" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#56606B">KNN · 决策树 · 随机森林</text>
      <text x="80" y="520" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#56606B">SVM · 朴素贝叶斯 · Logistic</text>
      <line x1="80" y1="546" x2="414" y2="546" stroke="#E8E3D6" stroke-width="1"/>
      <text x="80" y="576" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#8C949D">产出：性能排名 + 混淆矩阵</text>
      <text x="80" y="606" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" font-weight="700" fill="#1A3C6E">→ 选出最优基线模型</text>
    </g>

    <g id="exp2">
      <rect x="453" y="364" width="374" height="270" rx="10" fill="#FFFFFF" stroke="#D4D0C4" stroke-width="1"/>
      <rect x="453" y="364" width="374" height="56" rx="10" fill="#5B7DB1"/>
      <rect x="453" y="396" width="374" height="24" fill="#5B7DB1"/>
      <circle cx="485" cy="392" r="18" fill="#FFFFFF" fill-opacity="0.15"/>
      <text x="485" y="399" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">02</text>
      <text x="513" y="399" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">超参数调优</text>
      <use data-icon="tabler-outline/adjustments" x="473" y="440" width="26" height="26" fill="#5B7DB1" stroke-width="2"/>
      <text x="509" y="460" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" font-weight="700" fill="#23262B">GridSearchCV 网格搜索</text>
      <text x="473" y="494" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#56606B">对 SVM / RF / 决策树 / KNN</text>
      <text x="473" y="520" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#56606B">逐模型搜索最优超参组合</text>
      <line x1="473" y1="546" x2="807" y2="546" stroke="#E8E3D6" stroke-width="1"/>
      <text x="473" y="576" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#8C949D">产出：最优配置 + 调优收益</text>
      <text x="473" y="606" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" font-weight="700" fill="#5B7DB1">→ 榨干模型上限</text>
    </g>

    <g id="exp3">
      <rect x="846" y="364" width="374" height="270" rx="10" fill="#FFFFFF" stroke="#D4D0C4" stroke-width="1"/>
      <rect x="846" y="364" width="374" height="56" rx="10" fill="#B11226"/>
      <rect x="846" y="396" width="374" height="24" fill="#B11226"/>
      <circle cx="878" cy="392" r="18" fill="#FFFFFF" fill-opacity="0.15"/>
      <text x="878" y="399" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">03</text>
      <text x="906" y="399" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">因子重要性分析</text>
      <use data-icon="tabler-outline/microscope" x="866" y="440" width="26" height="26" fill="#B11226" stroke-width="2"/>
      <text x="902" y="460" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" font-weight="700" fill="#23262B">三方法共识排名</text>
      <text x="866" y="494" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#56606B">RF 重要性 + Permutation</text>
      <text x="866" y="520" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#56606B">+ SHAP 可解释性</text>
      <line x1="866" y1="546" x2="1200" y2="546" stroke="#E8E3D6" stroke-width="1"/>
      <text x="866" y="576" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#8C949D">产出：Top-10 关键因子</text>
      <text x="866" y="606" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" font-weight="700" fill="#B11226">→ 回答"哪些因素最关键"</text>
    </g>
  </g>

  <g id="p06-footer">
    <line x1="60" y1="690" x2="1220" y2="690" stroke="#E8E3D6" stroke-width="1"/>
    <text x="60" y="708" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="11" fill="#8C949D">技术栈：scikit-learn · imbalanced-learn (SMOTE) · SHAP · 以 Macro F1 为主指标</text>
    <text x="1220" y="708" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="11" fill="#8C949D">06 / 14</text>
  </g>
</svg>
