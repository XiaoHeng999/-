<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="p09-header">
    <text x="60" y="74" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="30" font-weight="800" fill="#1A3C6E">GridSearch 调优后 SVM 的 CV Macro F1 由 0.486 提升至 0.520</text>
    <rect x="62" y="90" width="60" height="5" rx="2.5" fill="#B11226"/>
  </g>

  <g id="panel-heatmap">
    <text x="60" y="132" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#B11226" letter-spacing="2">SVM · C × γ 网格热力</text>
    <rect x="60" y="142" width="400" height="372" rx="10" fill="#FAF8F3" stroke="#D4D0C4" stroke-width="1"/>
    <image href="../images/heatmap_C_vs_gamma.png" x="64" y="146" width="392" height="364" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g id="panel-line">
    <text x="480" y="132" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#B11226" letter-spacing="2">SVM · C 参数折线</text>
    <rect x="480" y="142" width="320" height="372" rx="10" fill="#FAF8F3" stroke="#D4D0C4" stroke-width="1"/>
    <image href="../images/line_C.png" x="484" y="146" width="312" height="364" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g id="param-table">
    <text x="820" y="132" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#B11226" letter-spacing="2">最优超参 · GridSearchCV</text>
    <rect x="820" y="142" width="400" height="372" rx="10" fill="#FFFFFF" stroke="#D4D0C4" stroke-width="1"/>

    <rect x="820" y="142" width="400" height="34" rx="10" fill="#1A3C6E"/>
    <rect x="820" y="162" width="400" height="14" fill="#1A3C6E"/>
    <text x="838" y="164" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">模型</text>
    <text x="958" y="164" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Best CV F1</text>
    <text x="1204" y="164" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">最优超参</text>

    <rect x="820" y="178" width="400" height="62" fill="#FBE9EB"/>
    <text x="838" y="206" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" font-weight="800" fill="#B11226">SVM</text>
    <text x="958" y="206" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="18" font-weight="800" fill="#B11226">0.5199</text>
    <text x="838" y="228" font-family="Consolas,'Courier New',monospace" font-size="12" fill="#56606B">C=0.1 · kernel=linear · γ=scale</text>

    <line x1="838" y1="244" x2="1204" y2="244" stroke="#E8E3D6" stroke-width="1"/>
    <text x="838" y="272" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" font-weight="700" fill="#23262B">随机森林</text>
    <text x="958" y="272" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" fill="#23262B">0.5153</text>
    <text x="838" y="294" font-family="Consolas,'Courier New',monospace" font-size="12" fill="#56606B">n=200 · depth=10 · split=10 · feat=√</text>

    <line x1="838" y1="308" x2="1204" y2="308" stroke="#E8E3D6" stroke-width="1"/>
    <text x="838" y="336" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" font-weight="700" fill="#23262B">决策树</text>
    <text x="958" y="336" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" fill="#23262B">0.4760</text>
    <text x="838" y="358" font-family="Consolas,'Courier New',monospace" font-size="12" fill="#56606B">entropy · depth=10 · split=10</text>

    <line x1="838" y1="372" x2="1204" y2="372" stroke="#E8E3D6" stroke-width="1"/>
    <text x="838" y="400" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" font-weight="700" fill="#23262B">KNN</text>
    <text x="958" y="400" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" fill="#23262B">0.4027</text>
    <text x="838" y="422" font-family="Consolas,'Courier New',monospace" font-size="12" fill="#56606B">k=3 · distance · manhattan</text>

    <line x1="838" y1="436" x2="1204" y2="436" stroke="#D4D0C4" stroke-width="1.5"/>
    <use data-icon="tabler-outline/trending-up" x="838" y="452" width="22" height="22" fill="#2E7D32" stroke-width="2"/>
    <text x="868" y="470" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#23262B">SVM 调优收益 <tspan font-weight="800" fill="#2E7D32">+0.034</tspan>（0.486 → 0.520）</text>
  </g>

  <g id="p09-insight">
    <rect x="60" y="530" width="1160" height="120" rx="10" fill="#F3F1EC"/>
    <use data-icon="tabler-outline/bulb" x="84" y="554" width="28" height="28" fill="#B11226" stroke-width="2"/>
    <text x="124" y="576" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="18" font-weight="800" fill="#1A3C6E">线性核 + 小 C 让 SVM 最稳，调优收益主要来自 SVM 自身</text>
    <text x="124" y="610" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" fill="#56606B">热力 / 折线显示 C 偏小、核为 linear 时表现最佳——反映特征关系近线性可分；</text>
    <text x="124" y="636" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" fill="#56606B">调优后 SVM 以 CV Macro F1 = <tspan font-weight="800" fill="#B11226">0.520</tspan> 成为全局最优。</text>
  </g>

  <g id="p09-footer">
    <line x1="60" y1="690" x2="1220" y2="690" stroke="#E8E3D6" stroke-width="1"/>
    <text x="60" y="708" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="11" fill="#8C949D">数据来源：results/hyperparameter_tuning/{svm/, summary.csv}</text>
    <text x="1220" y="708" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="11" fill="#8C949D">09 / 14</text>
  </g>
</svg>
