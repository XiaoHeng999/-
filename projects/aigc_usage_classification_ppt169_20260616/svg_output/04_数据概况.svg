<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="p04-header">
    <text x="60" y="74" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="30" font-weight="800" fill="#1A3C6E">1781 份问卷、64 个特征，目标是严重不平衡的三分类</text>
    <rect x="62" y="90" width="60" height="5" rx="2.5" fill="#B11226"/>
  </g>

  <g id="donut-panel">
    <text x="60" y="150" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#B11226" letter-spacing="2">目标变量分布 · Q9 使用频率</text>
    <g id="chartArea" transform="translate(0,0)">
      <!-- chart-plot-area: donut | center: 300,400 | outer-radius: 130 | inner-radius: 80 -->
      <g id="donutChart" transform="translate(300,400)">
        <path d="M 0,-130 A 130,130 0 0,1 63.30,-113.54 L 38.95,-69.87 A 80,80 0 0,0 0,-80 Z" fill="#B11226"/>
        <path d="M 63.30,-113.54 A 130,130 0 1,1 -117.91,-54.52 L -72.56,-33.55 A 80,80 0 1,0 38.95,-69.87 Z" fill="#1A3C6E"/>
        <path d="M -117.91,-54.52 A 130,130 0 0,1 0,-130 L 0,-80 A 80,80 0 0,0 -72.56,-33.55 Z" fill="#5B7DB1"/>
        <circle cx="0" cy="0" r="80" fill="#FFFFFF"/>
        <text x="0" y="-4" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="42" font-weight="800" fill="#1A3C6E">1781</text>
        <text x="0" y="24" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#8C949D">总样本量</text>
      </g>
      <g id="donut-legend">
        <rect x="60" y="566" width="14" height="14" rx="3" fill="#B11226"/>
        <text x="82" y="579" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" fill="#23262B">低频 <tspan font-weight="800" fill="#B11226">8.1%</tspan>（145）</text>
        <rect x="60" y="600" width="14" height="14" rx="3" fill="#1A3C6E"/>
        <text x="82" y="613" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" fill="#23262B">中频 <tspan font-weight="800" fill="#1A3C6E">73.8%</tspan>（1315）</text>
        <rect x="300" y="566" width="14" height="14" rx="3" fill="#5B7DB1"/>
        <text x="322" y="579" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" fill="#23262B">高频 <tspan font-weight="800" fill="#5B7DB1">18.0%</tspan>（321）</text>
      </g>
    </g>
  </g>

  <line x1="568" y1="140" x2="568" y2="650" stroke="#E8E3D6" stroke-width="1.5"/>

  <g id="feature-table">
    <text x="600" y="150" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#B11226" letter-spacing="2">特征构成 · 原始 78 列经特征工程约 64 个特征</text>
    <rect x="600" y="170" width="620" height="36" fill="#F3F1EC"/>
    <text x="616" y="193" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#56606B">特征组（来源）</text>
    <text x="1010" y="193" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#56606B" text-anchor="middle">数量</text>
    <text x="1206" y="193" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#56606B" text-anchor="end">编码</text>

    <text x="616" y="232" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" fill="#23262B">Q1 性别</text>
    <text x="1010" y="232" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" font-weight="700" fill="#1A3C6E">1</text>
    <text x="1206" y="232" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#8C949D">原编码</text>
    <line x1="616" y1="244" x2="1206" y2="244" stroke="#E8E3D6" stroke-width="1"/>

    <text x="616" y="272" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" fill="#23262B">Q2 学历 / Q3 专业 / Q4 年级</text>
    <text x="1010" y="272" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" font-weight="700" fill="#1A3C6E">11</text>
    <text x="1206" y="272" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#8C949D">One-Hot</text>
    <line x1="616" y1="284" x2="1206" y2="284" stroke="#E8E3D6" stroke-width="1"/>

    <text x="616" y="312" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" fill="#23262B">Q5 课程偏好</text>
    <text x="1010" y="312" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" font-weight="700" fill="#1A3C6E">4</text>
    <text x="1206" y="312" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#8C949D">One-Hot</text>
    <line x1="616" y1="324" x2="1206" y2="324" stroke="#E8E3D6" stroke-width="1"/>

    <text x="616" y="352" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" fill="#23262B">Q6 / Q7 课堂与分数重要度</text>
    <text x="1010" y="352" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" font-weight="700" fill="#1A3C6E">2</text>
    <text x="1206" y="352" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#8C949D">数值 0–100%</text>
    <line x1="616" y1="364" x2="1206" y2="364" stroke="#E8E3D6" stroke-width="1"/>

    <text x="616" y="392" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" fill="#23262B">Q8 产品使用（二值列 + 数量）</text>
    <text x="1010" y="392" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" font-weight="800" fill="#B11226">11</text>
    <text x="1206" y="392" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#8C949D">二值 + 计数</text>
    <line x1="616" y1="404" x2="1206" y2="404" stroke="#E8E3D6" stroke-width="1"/>

    <text x="616" y="432" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" fill="#23262B">Q10 功能使用排序</text>
    <text x="1010" y="432" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" font-weight="700" fill="#1A3C6E">13</text>
    <text x="1206" y="432" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#8C949D">数值（NaN→14）</text>
    <line x1="616" y1="444" x2="1206" y2="444" stroke="#E8E3D6" stroke-width="1"/>

    <text x="616" y="472" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" fill="#23262B">Q11–Q14 四大场景量表</text>
    <text x="1010" y="472" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="15" font-weight="800" fill="#1A3C6E">33</text>
    <text x="1206" y="472" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#8C949D">Likert 1–5</text>
    <line x1="616" y1="484" x2="1206" y2="484" stroke="#D4D0C4" stroke-width="1.5"/>

    <text x="616" y="514" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" font-weight="800" fill="#1A3C6E">合计建模特征</text>
    <text x="1010" y="514" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="17" font-weight="800" fill="#B11226">≈ 64</text>
    <text x="1206" y="514" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#1A3C6E">9 个特征组</text>
  </g>

  <g id="p04-insight">
    <rect x="600" y="548" width="620" height="96" rx="10" fill="#F3F1EC"/>
    <use data-icon="tabler-outline/alert-triangle" x="620" y="572" width="26" height="26" fill="#C77700" stroke-width="2"/>
    <text x="656" y="592" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="16" font-weight="700" fill="#1A3C6E">样本量充足，但类别极度偏斜</text>
    <text x="656" y="620" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#56606B">中频类占比近七成四，低频类仅 8.1%——这是后续建模难度的根源。</text>
  </g>

  <g id="p04-footer">
    <line x1="60" y1="690" x2="1220" y2="690" stroke="#E8E3D6" stroke-width="1"/>
    <text x="60" y="708" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="11" fill="#8C949D">数据来源：问卷数据 数据.xlsx（1781 份），特征工程后纳入建模</text>
    <text x="1220" y="708" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="11" fill="#8C949D">04 / 14</text>
  </g>
</svg>
