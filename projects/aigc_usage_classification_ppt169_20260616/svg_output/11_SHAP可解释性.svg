<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <g id="p11-header">
    <text x="60" y="74" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="30" font-weight="800" fill="#1A3C6E">SHAP 确认全局结论，并揭示高低频群体的差异化驱动</text>
    <rect x="62" y="90" width="60" height="5" rx="2.5" fill="#B11226"/>
  </g>

  <g id="panel-shap">
    <text x="60" y="132" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" font-weight="700" fill="#B11226" letter-spacing="2">SHAP BEESWARM · 特征影响方向与幅度</text>
    <rect x="60" y="142" width="720" height="510" rx="10" fill="#FAF8F3" stroke="#D4D0C4" stroke-width="1"/>
    <image href="../images/factor_shap_beeswarm.png" x="64" y="146" width="712" height="502" preserveAspectRatio="xMidYMid meet"/>
    <text x="80" y="640" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="12" fill="#8C949D">红点 = 特征高值，蓝点 = 低值；点越偏右，越推向高频使用</text>
  </g>

  <g id="shap-insights">
    <g id="insight-global">
      <rect x="800" y="142" width="420" height="160" rx="10" fill="#FFFFFF" stroke="#D4D0C4" stroke-width="1"/>
      <rect x="800" y="142" width="5" height="160" rx="2.5" fill="#1A3C6E"/>
      <use data-icon="tabler-outline/chart-bar" x="824" y="162" width="24" height="24" fill="#1A3C6E" stroke-width="2"/>
      <text x="856" y="180" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="17" font-weight="800" fill="#1A3C6E">全局方向性</text>
      <text x="824" y="214" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#23262B"><tspan font-weight="700" fill="#B11226">product_count 高</tspan> → 正向贡献</text>
      <text x="824" y="240" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#23262B">文本生成 / 调试代码 → 正向</text>
      <text x="824" y="272" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#56606B">SHAP 给出影响方向，比单纯</text>
      <text x="824" y="292" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#56606B">排序更可解释</text>
    </g>

    <g id="insight-high">
      <rect x="800" y="316" width="420" height="160" rx="10" fill="#FFFFFF" stroke="#D4D0C4" stroke-width="1"/>
      <rect x="800" y="316" width="5" height="160" rx="2.5" fill="#5B7DB1"/>
      <use data-icon="tabler-outline/trending-up" x="824" y="336" width="24" height="24" fill="#5B7DB1" stroke-width="2"/>
      <text x="856" y="354" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="17" font-weight="800" fill="#1A3C6E">高频群体</text>
      <text x="824" y="388" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#23262B">受产品广度 + 编程功能驱动</text>
      <text x="824" y="414" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#23262B">广用多产品、文本与代码并行</text>
      <text x="824" y="446" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#56606B">这些特征的 SHAP 值显著偏正</text>
    </g>

    <g id="insight-low">
      <rect x="800" y="490" width="420" height="162" rx="10" fill="#FFFFFF" stroke="#D4D0C4" stroke-width="1"/>
      <rect x="800" y="490" width="5" height="162" rx="2.5" fill="#B11226"/>
      <use data-icon="tabler-outline/microscope" x="824" y="510" width="24" height="24" fill="#B11226" stroke-width="2"/>
      <text x="856" y="528" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="17" font-weight="800" fill="#1A3C6E">低频群体</text>
      <text x="824" y="562" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#23262B">常与产品单一、不用文本 /</text>
      <text x="824" y="588" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="14" fill="#23262B">代码功能相伴</text>
      <text x="824" y="620" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#56606B">同一组强因子，对高频是推力、</text>
      <text x="824" y="640" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="13" fill="#56606B">对低频是阻力</text>
    </g>
  </g>

  <g id="p11-footer">
    <line x1="60" y1="690" x2="1220" y2="690" stroke="#E8E3D6" stroke-width="1"/>
    <text x="60" y="708" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="11" fill="#8C949D">数据来源：results/factor_analysis/shap_beeswarm.png（SHAP 全局解释）</text>
    <text x="1220" y="708" text-anchor="end" font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif" font-size="11" fill="#8C949D">11 / 14</text>
  </g>
</svg>
